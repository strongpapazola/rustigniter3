services:
  rustigniter:
    build:
      context: .
      dockerfile: Dockerfile
    image: rustigniter:3.0.0
    container_name: rustigniter
    ports:
      - "8099:8099"
    volumes:
      # Persist SQLite DB, logs, sessions, and local uploads.
      - rustigniter-storage:/app/storage
      - rustigniter-uploads:/app/public/uploads
    restart: unless-stopped

  # Optional PostgreSQL service for users who switch config/database.toml to driver = "postgres".
  # Run with: docker compose --profile postgres up -d postgres
  postgres:
    image: postgres:15-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: rustigniter
      POSTGRES_PASSWORD: rahasia
      POSTGRES_DB: rustigniter
    ports:
      - "5433:5432"
    volumes:
      - rustigniter-postgres:/var/lib/postgresql/data

  # Optional S3-compatible bucket for users who switch config/storage.toml to driver = "s3".
  # Run with: docker compose --profile s3 up -d minio
  minio:
    image: minio/minio:latest
    profiles: ["s3"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - rustigniter-minio:/data

volumes:
  rustigniter-storage:
  rustigniter-uploads:
  rustigniter-postgres:
  rustigniter-minio:
