<!doctype html>
<html lang="id">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Masuk — RustIgniter</title>
	<style>
		body { font-family: system-ui, sans-serif; margin: 0; min-height: 100vh; display: grid;
			place-items: center; background: #f6f7f9; color: #20232a; }
		.card { background: #fff; width: 340px; padding: 2rem 2.25rem; border-radius: 16px;
			box-shadow: 0 10px 40px rgba(0,0,0,.08); border: 1px solid #ececf1; }
		h1 { margin: 0 0 1.25rem; font-size: 1.4rem; }
		label { display: block; font-size: .85rem; color: #555; margin: .6rem 0 .25rem; }
		input { width: 100%; box-sizing: border-box; padding: .6rem .7rem; border: 1px solid #ccc;
			border-radius: 8px; font-size: 1rem; }
		button { margin-top: 1.1rem; width: 100%; padding: .65rem; border: 0; border-radius: 8px;
			background: #d33; color: #fff; font-weight: 600; font-size: 1rem; cursor: pointer; }
		.errors { background: #fdecec; border: 1px solid #f5c2c2; color: #a11; border-radius: 10px;
			padding: .6rem .8rem; margin-bottom: 1rem; font-size: .9rem; }
		.errors ul { margin: 0; padding-left: 1.1rem; }
		.hint { margin-top: 1rem; font-size: .8rem; color: #999; text-align: center; }
	</style>
</head>
<body>
	<main class="card">
		<h1>Masuk</h1>

		{% if errors %}
		<div class="errors"><ul>{% for e in errors %}<li>{{ e }}</li>{% endfor %}</ul></div>
		{% endif %}

		<form action="{{ base_url('login') }}" method="post">
			<input type="hidden" name="csrf_token" value="{{ csrf_token }}">
			<label>Username</label>
			<input type="text" name="username" autofocus>
			<label>Password</label>
			<input type="password" name="password">
			<button type="submit">Masuk</button>
		</form>

		<p class="hint">Demo: <code>admin</code> / <code>admin123</code></p>
	</main>
</body>
</html>
