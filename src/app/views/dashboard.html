<!doctype html>
<html lang="id">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Dashboard — RustIgniter</title>
	<style>
		body { font-family: system-ui, sans-serif; margin: 0; min-height: 100vh; display: grid;
			place-items: center; background: #f6f7f9; color: #20232a; }
		.card { background: #fff; max-width: 480px; padding: 2.25rem 2.5rem; border-radius: 16px;
			box-shadow: 0 10px 40px rgba(0,0,0,.08); border: 1px solid #ececf1; }
		h1 { margin: 0 0 .5rem; }
		.success { background: #eafaf0; border: 1px solid #b8e6c8; color: #1a7d46; border-radius: 10px;
			padding: .6rem .8rem; margin-bottom: 1rem; font-size: .9rem; }
		a.logout { display: inline-block; margin-top: 1.25rem; color: #d33; text-decoration: none; }
		code { background: #f1f1f4; padding: .15rem .4rem; border-radius: 5px; }
	</style>
</head>
<body>
	<main class="card">
		{% if flash.success %}
		<div class="success">{{ flash.success }}</div>
		{% endif %}

		<h1>Halo, {{ username }} 👋</h1>
		<p>Ini halaman <strong>terproteksi</strong> — hanya tampil bila kamu sudah login
		(sesi tersimpan lewat cookie <code>ri_session</code>).</p>

		<a class="logout" href="{{ base_url('logout') }}">← Keluar (logout)</a>
	</main>
</body>
</html>
