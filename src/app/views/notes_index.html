<!doctype html>
<html lang="id">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Catatan — RustIgniter</title>
	<style>
		body { font-family: system-ui, sans-serif; margin: 0; background: #f6f7f9; color: #20232a; }
		main { max-width: 640px; margin: 3rem auto; background: #fff; padding: 2rem 2.25rem;
			border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,.08); border: 1px solid #ececf1; }
		h1 { margin: 0 0 1rem; font-size: 1.6rem; }
		ul { list-style: none; padding: 0; margin: 0 0 1.5rem; }
		li { padding: .7rem .9rem; border: 1px solid #eee; border-radius: 10px; margin-bottom: .5rem;
			display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
		.meta { color: #999; font-size: .8rem; white-space: nowrap; }
		form { display: flex; gap: .5rem; }
		input[type=text] { flex: 1; padding: .6rem .7rem; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
		button { padding: .6rem 1rem; border: 0; border-radius: 8px; background: #d33; color: #fff; font-weight: 600; cursor: pointer; }
		a { color: #d33; text-decoration: none; }
		.empty { color: #888; font-style: italic; }
		.errors { background: #fdecec; border: 1px solid #f5c2c2; color: #a11; border-radius: 10px;
			padding: .7rem .9rem; margin-bottom: 1rem; }
		.errors ul { margin: 0; padding-left: 1.1rem; }
		.errors li { display: list-item; border: 0; padding: .15rem 0; margin: 0; background: none; }
	</style>
</head>
<body>
	<main>
		<h1>Catatan ({{ notes | length }})</h1>

		{% if errors %}
		<div class="errors">
			<ul>{% for e in errors %}<li>{{ e }}</li>{% endfor %}</ul>
		</div>
		{% endif %}

		<ul>
			{% for n in notes %}
			<li>
				<span><a href="{{ base_url('notes/show/' ~ n.id) }}">#{{ n.id }} — {{ n.text }}</a></span>
				<span class="meta">{{ n.created }}</span>
			</li>
			{% else %}
			<li class="empty">Belum ada catatan.</li>
			{% endfor %}
		</ul>

		<form action="{{ base_url('notes/add') }}" method="post">
			<input type="text" name="text" value="{{ old_text }}" placeholder="Tulis catatan baru…" autofocus>
			<button type="submit">Tambah</button>
		</form>
	</main>
</body>
</html>
